name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "tsconfig.json"
      - "rollup.config.*"

env:
  NODE_VERSION: "20"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "ERROR: dist/index.js not found"
            exit 1
          fi
          echo "Build output OK"
          ls -lh dist/
